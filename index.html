<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🍄 63大冒险 · 大屏版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a1e2b 0%, #2a3342 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      padding: 20px;
    }
    .game-container {
      background: #0b0e14;
      padding: 30px 30px 35px;
      border-radius: 48px;
      box-shadow: 0 25px 40px rgba(0,0,0,0.8), inset 0 0 0 3px #5f7a9c;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 1200px;
      width: fit-content;
    }
    canvas {
      display: block;
      width: 1000px;
      height: 600px;
      border-radius: 28px;
      box-shadow: inset 0 0 30px #000000aa, 0 12px 0 #3e2b1a;
      background: #9ad9ff;
      cursor: pointer;
    }
    .panel {
      width: 100%;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }
    .stats {
      display: flex;
      gap: 48px;
      background: #1e1a16;
      padding: 14px 40px;
      border-radius: 80px;
      box-shadow: inset 0 6px 6px rgba(0,0,0,0.5), 0 8px 0 #3b2e22;
      border-bottom: 3px solid #ab8e64;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat span:first-child {
      font-size: 38px;
      filter: drop-shadow(0 4px 3px black);
    }
    .stat .value {
      font-size: 38px;
      font-weight: bold;
      color: #fee7b0;
      text-shadow: 4px 4px 0 #7b4f2b;
      min-width: 90px;
      text-align: right;
      letter-spacing: 3px;
    }
    .restart-btn {
      background: #e9b13b;
      border: none;
      border-bottom: 8px solid #8b5e1a;
      color: #1f2c0e;
      font-weight: bold;
      font-size: 30px;
      padding: 14px 42px;
      border-radius: 60px;
      box-shadow: 0 8px 0 #5a3f18, 0 10px 16px black;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.05s ease-in;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .restart-btn:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #5a3f18, 0 8px 14px black;
      border-bottom-width: 4px;
    }
    .restart-btn:hover {
      background: #f5c45e;
    }
    .hint {
      color: #d0d0e0;
      margin-top: 20px;
      font-weight: bold;
      font-size: 24px;
      text-shadow: 3px 3px 0 #0f0f1a;
    }
    .hint kbd {
      background: #2f2b26;
      color: #fad98b;
      padding: 8px 18px;
      border-radius: 40px;
      margin: 0 6px;
      border-bottom: 4px solid #856f42;
      font-size: 24px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="1000" height="600"></canvas>
  
  <div class="panel">
    <div class="stats">
      <div class="stat">
        <span>❤️</span>
        <span class="value" id="healthDisplay">3</span>
      </div>
      <div class="stat">
        <span>🪙</span>
        <span class="value" id="coinDisplay">000</span>
      </div>
      <div class="stat">
        <span>⭐</span>
        <span class="value" id="scoreDisplay">0000</span>
      </div>
    </div>
    <button class="restart-btn" id="restartButton">▶ 开始</button>
  </div>
  <div class="hint">
    <kbd>←</kbd><kbd>→</kbd> 或 <kbd>A</kbd><kbd>D</kbd> 移动 · <kbd>空格</kbd> 跳跃 · 踩踏头部 · 拾取✨
  </div>
</div>

<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const healthSpan = document.getElementById('healthDisplay');
    const coinSpan = document.getElementById('coinDisplay');
    const scoreSpan = document.getElementById('scoreDisplay');

    // ----- 图片加载 -----
    const playerImage = new Image();
    playerImage.src = 'https://i.ibb.co/M58br8Sv/image.png';
    playerImage.crossOrigin = 'Anonymous';
    
    const enemyImage = new Image();
    enemyImage.src = 'https://i.ibb.co/N26bH2kj/image.png';
    enemyImage.crossOrigin = 'Anonymous';
    
    // ===== 大屏尺寸调整 =====
    const GROUND_Y = 500;          // 地面高度 (原来340)
    const PLAYER_WIDTH = 52;       // 原34 → 52
    const PLAYER_HEIGHT = 64;      // 原42 → 64
    const ENEMY_WIDTH = 50;        // 原32 → 50
    const ENEMY_HEIGHT = 50;       // 原32 → 50
    
    // 游戏状态
    let gameActive = false;       
    let gameOver = false;        
    
    let player = {
      x: 140,
      y: GROUND_Y - PLAYER_HEIGHT,
      vx: 0, vy: 0,
      width: PLAYER_WIDTH,
      height: PLAYER_HEIGHT,
      grounded: false,
      invincible: false,
      invincibleTimer: 0,
      health: 3,
      maxHealth: 5
    };

    let moveLeft = false;
    let moveRight = false;
    
    const WALK_ACCEL = 1.5;
    const WALK_MAX_SPEED = 7.0;
    const FRICTION = 0.72;
    
    let enemies = [];            
    let coins = [];             
    let powerStars = [];
    
    let coinsCollected = 0;
    let distanceScore = 0;
    let enemiesStomped = 0;
    
    const BASE_SCROLL_SPEED = 3.8;  // 稍微加快，匹配大屏
    let currentScrollSpeed = BASE_SCROLL_SPEED;
    
    let spawnTimer = 0;
    let coinSpawnTimer = 0;
    let starSpawnTimer = 0;
    
    let animationId = null;
    
    const GRAVITY = 0.65;
    const JUMP_FORCE = -13.0;
    const STOMP_BOUNCE = -8.0;
    
    const ENEMY_BASE_SPEED = 2.8;
    
    const COIN_SIZE = 34;
    const COIN_Y_OFFSET = 22;
    const STAR_SIZE = 40;
    
    const MIN_PLAYER_X = 10;
    const MAX_PLAYER_X = canvas.width - PLAYER_WIDTH - 10;
    
    let floatingTexts = [];
    
    function formatCoins(v) { return v.toString().padStart(3, '0').slice(0,3); }
    function formatScore(v) { return Math.min(9999, Math.floor(v)).toString().padStart(4, '0'); }
    
    function updateUI() {
      healthSpan.textContent = player.health;
      coinSpan.textContent = formatCoins(coinsCollected);
      scoreSpan.textContent = formatScore(distanceScore);
    }

    function addFloatingText(text, x, y, color = '#FFD700') {
      floatingTexts.push({ text, x, y, color, life: 55, vy: -1.5 });
    }

    function resetGame() {
      gameActive = true;
      gameOver = false;
      
      player = {
        x: 140, y: GROUND_Y - PLAYER_HEIGHT,
        vx: 0, vy: 0,
        width: PLAYER_WIDTH, height: PLAYER_HEIGHT,
        grounded: false,
        invincible: false, invincibleTimer: 0,
        health: 3, maxHealth: 5
      };
      
      moveLeft = false; moveRight = false;
      enemies = []; coins = []; powerStars = []; floatingTexts = [];
      coinsCollected = 0; distanceScore = 0; enemiesStomped = 0;
      currentScrollSpeed = BASE_SCROLL_SPEED;
      spawnTimer = 0; coinSpawnTimer = 0; starSpawnTimer = 100;
      updateUI();
    }

    function rectCollide(r1, r2) {
      return !(r2.x >= r1.x + r1.width || r2.x + r2.width <= r1.x ||
               r2.y >= r1.y + r1.height || r2.y + r2.height <= r1.y);
    }

    function handleEnemyCollisions() {
      const playerRect = { x: player.x, y: player.y, width: player.width, height: player.height };
      
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        const enemyRect = { x: enemy.x, y: enemy.y, width: enemy.width, height: enemy.height };
        if (!rectCollide(playerRect, enemyRect)) continue;
        
        const playerBottom = player.y + player.height;
        const enemyTop = enemy.y;
        const isFalling = player.vy >= 0;
        const feetNearEnemyTop = playerBottom >= enemyTop && playerBottom <= enemyTop + 26;
        
        if (isFalling && feetNearEnemyTop && !player.invincible) {
          enemies.splice(i, 1);
          player.vy = STOMP_BOUNCE;
          player.grounded = false;
          enemiesStomped++;
          distanceScore += 150;
          addFloatingText('💥踩踏!', enemy.x, enemy.y - 15, '#FFA500');
          if (Math.random() < 0.6) {
            coins.push({ x: enemy.x + 8, y: enemy.y - 8, width: COIN_SIZE, height: COIN_SIZE, collected: false });
          }
        } else {
          if (!player.invincible && gameActive) {
            player.health--;
            player.invincible = true;
            player.invincibleTimer = 100;
            addFloatingText('-1 ❤️', player.x, player.y - 30, '#ff6666');
            if (player.health <= 0) { gameActive = false; gameOver = true; player.health = 0; }
            player.vx = (enemy.x < player.x) ? 6 : -6;
            player.vy = -4;
          }
        }
        updateUI();
        break;
      }
    }

    function collectStars() {
      const pr = { x: player.x, y: player.y, width: player.width, height: player.height };
      for (let i=powerStars.length-1; i>=0; i--) {
        const s = powerStars[i];
        if (rectCollide(pr, { x: s.x, y: s.y, width: s.width, height: s.height })) {
          powerStars.splice(i,1);
          player.invincible = true;
          player.invincibleTimer = 240;
          addFloatingText('✨ 无敌63神力! ✨', player.x, player.y-40, '#FFD700');
          distanceScore += 100;
        }
      }
    }

    function collectCoins() {
      const pr = { x: player.x, y: player.y, width: player.width, height: player.height };
      for (let i=coins.length-1; i>=0; i--) {
        const c = coins[i];
        if (rectCollide(pr, { x: c.x, y: c.y, width: c.width, height: c.height })) {
          coins.splice(i,1);
          coinsCollected++;
          distanceScore += 60;
          addFloatingText('+60', c.x, c.y-8, '#f5e56b');
        }
      }
    }

    function spawnEnemy() {
      enemies.push({ x: canvas.width, y: GROUND_Y - ENEMY_HEIGHT, width: ENEMY_WIDTH, height: ENEMY_HEIGHT, speed: ENEMY_BASE_SPEED });
    }
    function spawnCoin() {
      coins.push({ x: canvas.width + 10, y: GROUND_Y - COIN_SIZE - COIN_Y_OFFSET - Math.random()*30, width: COIN_SIZE, height: COIN_SIZE });
    }
    function spawnPowerStar() {
      powerStars.push({ x: canvas.width, y: GROUND_Y - 80 - Math.random()*50, width: STAR_SIZE, height: STAR_SIZE });
    }

    function updateGame() {
      if (!gameActive) return;
      
      if (player.invincible) {
        player.invincibleTimer--;
        if (player.invincibleTimer <= 0) player.invincible = false;
      }
      
      let dir = 0;
      if (moveLeft) dir -= 1;
      if (moveRight) dir += 1;
      player.vx = dir ? player.vx + dir*WALK_ACCEL : player.vx * FRICTION;
      if (player.vx > WALK_MAX_SPEED) player.vx = WALK_MAX_SPEED;
      if (player.vx < -WALK_MAX_SPEED) player.vx = -WALK_MAX_SPEED;
      player.x += player.vx;
      player.x = Math.min(MAX_PLAYER_X, Math.max(MIN_PLAYER_X, player.x));
      
      player.vy += GRAVITY;
      player.y += player.vy;
      if (player.y >= GROUND_Y - player.height) {
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        player.grounded = true;
      } else {
        player.grounded = false;
      }
      
      enemies = enemies.filter(e => (e.x -= currentScrollSpeed + e.speed) + e.width > 0);
      coins = coins.filter(c => (c.x -= currentScrollSpeed) + c.width > 0);
      powerStars = powerStars.filter(s => (s.x -= currentScrollSpeed) + s.width > 0);
      
      floatingTexts = floatingTexts.filter(ft => { ft.life--; ft.y += ft.vy; return ft.life > 0; });
      
      distanceScore += currentScrollSpeed * 0.5;
      currentScrollSpeed = BASE_SCROLL_SPEED + Math.floor(distanceScore / 600) * 0.8;
      
      if (--spawnTimer <= 0) { spawnEnemy(); spawnTimer = Math.max(45, 80 - Math.floor(distanceScore/400)) + Math.floor(Math.random()*35); }
      if (--coinSpawnTimer <= 0) { spawnCoin(); coinSpawnTimer = 40 + Math.floor(Math.random()*50); if(Math.random()<0.35) spawnCoin(); }
      if (--starSpawnTimer <= 0) { spawnPowerStar(); starSpawnTimer = 350 + Math.floor(Math.random()*300); }
      
      collectStars();
      collectCoins();
      handleEnemyCollisions();
      updateUI();
    }

    function jump() { if (gameActive && player.grounded) { player.vy = JUMP_FORCE; player.grounded = false; } }

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#b1e2ff'); grad.addColorStop(0.8, '#f0e6b2');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, GROUND_Y-10);
      
      ctx.fillStyle = '#ffffffdd';
      for (let i=0;i<4;i++) {
        let cx = (i*300 + performance.now()*0.03 % 1200) - 200;
        ctx.beginPath();
        ctx.arc(cx, 70+i*30, 45, 0, Math.PI*2);
        ctx.arc(cx+55, 55+i*25, 42, 0, Math.PI*2);
        ctx.arc(cx+110, 70+i*30, 45, 0, Math.PI*2);
        ctx.fill();
      }
      
      ctx.fillStyle = '#7fb07f';
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y-15); ctx.lineTo(180, GROUND_Y-90); ctx.lineTo(450, GROUND_Y-40);
      ctx.lineTo(750, GROUND_Y-100); ctx.lineTo(1000, GROUND_Y-60); ctx.lineTo(1000, GROUND_Y);
      ctx.lineTo(0, GROUND_Y); ctx.fill();
      
      ctx.fillStyle = '#a77b4b'; ctx.fillRect(0, GROUND_Y-8, canvas.width, 28);
      ctx.fillStyle = '#7c5e38'; ctx.fillRect(0, GROUND_Y, canvas.width, 30);
      ctx.fillStyle = '#5f8a4b';
      for (let i=0;i<canvas.width;i+=24) ctx.fillRect(i+5, GROUND_Y-14, 12, 18);
      
      powerStars.forEach(s => {
        ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 28;
        ctx.fillStyle = '#FFDF00';
        ctx.beginPath();
        ctx.arc(s.x+s.width/2, s.y+s.height/2, s.width/2, 0, Math.PI*2);
        ctx.fill();
        ctx.font = 'bold 36px "Courier New"'; ctx.fillStyle = '#FFF8DC';
        ctx.fillText('⭐', s.x+4, s.y+36);
        ctx.shadowBlur = 0;
      });
      
      coins.forEach(c => {
        ctx.shadowColor = '#f5e56b'; ctx.shadowBlur = 20;
        ctx.fillStyle = '#FFD966';
        ctx.beginPath();
        ctx.ellipse(c.x+c.width/2, c.y+c.height/2, c.width/2, c.height/2, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#F4C430';
        ctx.beginPath();
        ctx.ellipse(c.x+c.width/2-3, c.y+c.height/2-2, c.width/3, c.height/3, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.font = 'bold 28px "Courier New"'; ctx.fillStyle = '#b8860b';
        ctx.fillText('💰', c.x+3, c.y+28);
      });
      
      enemies.forEach(e => {
        if (enemyImage.complete) ctx.drawImage(enemyImage, e.x, e.y, e.width, e.height);
        else { ctx.fillStyle = '#8B4513'; ctx.fillRect(e.x, e.y, e.width, e.height); }
      });
      
      if (!player.invincible || (player.invincible && Math.floor(Date.now()/120) % 2)) {
        if (playerImage.complete) ctx.drawImage(playerImage, player.x, player.y, player.width, player.height);
        else { ctx.fillStyle = '#2ecc71'; ctx.fillRect(player.x, player.y, player.width, player.height); }
      }
      
      floatingTexts.forEach(t => {
        ctx.font = 'bold 28px "Courier New"'; ctx.fillStyle = t.color;
        ctx.shadowBlur = 14; ctx.shadowColor = '#000';
        ctx.fillText(t.text, t.x, t.y);
        ctx.shadowBlur = 0;
      });
      
      if (!gameActive && gameOver) {
        ctx.fillStyle = '#000000cc'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.font = 'bold 56px "Courier New"'; ctx.fillStyle = '#fcd34d';
        ctx.fillText('💀 被龙哥打败了 💀', 200, 320);
      } else if (!gameActive && !gameOver) {
        ctx.fillStyle = '#000000aa'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.font = 'bold 42px "Courier New"'; ctx.fillStyle = '#f7e05e';
        ctx.fillText('🍄 按 [开始] 或 移动跳跃 🍄', 180, 330);
      }
    }

    function gameLoop() { if (gameActive) updateGame(); drawScene(); animationId = requestAnimationFrame(gameLoop); }

    function handleKeyDown(e) {
      const k = e.key;
      if (k === ' ' || k === 'Space' || k.startsWith('Arrow')) e.preventDefault();
      if (k === ' ' || k === 'Space') { if (!gameActive && !gameOver) resetGame(); else if (gameActive) jump(); }
      if (k === 'ArrowLeft' || k === 'a' || k === 'A') moveLeft = true;
      if (k === 'ArrowRight' || k === 'd' || k === 'D') moveRight = true;
    }
    function handleKeyUp(e) {
      const k = e.key;
      if (k === ' ' || k === 'Space' || k.startsWith('Arrow')) e.preventDefault();
      if (k === 'ArrowLeft' || k === 'a' || k === 'A') moveLeft = false;
      if (k === 'ArrowRight' || k === 'd' || k === 'D') moveRight = false;
    }
    
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);
    document.getElementById('restartButton').addEventListener('click', resetGame);
    canvas.addEventListener('click', () => { if (!gameActive && !gameOver) resetGame(); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (!gameActive && !gameOver) resetGame(); else if (gameActive) jump(); }, {passive: false});
    
    animationId = requestAnimationFrame(gameLoop);
    gameActive = false; gameOver = false;
    updateUI();
    drawScene();
    window.addEventListener('beforeunload', () => cancelAnimationFrame(animationId));
  })();
</script>
</body>
</html>
