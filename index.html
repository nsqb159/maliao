function drawSprite(ctx, sprite, palette, x, y, scale, flipX) {
  const rows = sprite.trim().split('\n').map(r=>r.trim());
  const h=rows.length, w=rows[0].length;
  ctx.save();
  if(flipX){ ctx.translate(x+w*scale,y); ctx.scale(-1,1); x=0;y=0; }
  for(let r=0;r<h;r++) for(let c=0;c<w;c++){
    const ch=rows[r][c];
    if(ch==='.'||!palette[ch]) continue;
    ctx.fillStyle=palette[ch];
    ctx.fillRect(x+c*scale,y+r*scale,scale,scale);
  }
  ctx.restore();
}

// Auto-remove background from sprite images
function removeBackground(img, tolerance){
  tolerance = tolerance || 40;
  const offscreen = document.createElement('canvas');
  const w = offscreen.width = img.naturalWidth || img.width;
  const h = offscreen.height = img.naturalHeight || img.height;
  const octx = offscreen.getContext('2d');
  octx.drawImage(img, 0, 0);
  const imageData = octx.getImageData(0, 0, w, h);
  const d = imageData.data;

  // Detect background color from corners (sample 4 corners, pick most common)
  function sampleCorner(sx, sy, size){
    const counts = {};
    for(let y = sy; y < sy + size && y < h; y++){
      for(let x = sx; x < sx + size && x < w; x++){
        const i = (y * w + x) * 4;
        const key = d[i]+','+d[i+1]+','+d[i+2];
        counts[key] = (counts[key]||0) + 1;
      }
    }
    let best = null, bestCount = 0;
    for(const k in counts){ if(counts[k] > bestCount){ bestCount = counts[k]; best = k; } }
    return best ? best.split(',').map(Number) : [d[0], d[1], d[2]];
  }

  const s = Math.max(3, Math.min(8, Math.floor(w/10), Math.floor(h/10)));
  const corners = [
    sampleCorner(0, 0, s),
    sampleCorner(w - s, 0, s),
    sampleCorner(0, h - s, s),
    sampleCorner(w - s, h - s, s)
  ];

  // Pick the corner color that's most "background-like" (appears most at edges)
  // Simple: use top-left corner as primary, check if others match
  const bg = corners[0];
  const t2 = tolerance * tolerance;

  for(let i = 0; i < d.length; i += 4){
    const dr = d[i] - bg[0], dg = d[i+1] - bg[1], db = d[i+2] - bg[2];
    if(dr*dr + dg*dg + db*db < t2){
      d[i+3] = 0; // set alpha to 0 (transparent)
    }
  }

  octx.putImageData(imageData, 0, 0);

  // Also try to detect white/light background if primary bg was dark
  // (some sprites have white BG even if corners suggest otherwise)
  if(bg[0] + bg[1] + bg[2] < 382){ // dark bg detected
    // Check if any corner is white/light
    for(const c of corners){
      if(c[0] + c[1] + c[2] > 600){ // light corner found
        const imgData2 = octx.getImageData(0, 0, w, h);
        const d2 = imgData2.data;
        for(let i = 0; i < d2.length; i += 4){
          if(d2[i+3] === 0) continue; // already transparent
          const dr2 = d2[i] - c[0], dg2 = d2[i+1] - c[1], db2 = d2[i+2] - c[2];
          if(dr2*dr2 + dg2*dg2 + db2*db2 < t2){
            d2[i+3] = 0;
          }
        }
        octx.putImageData(imgData2, 0, 0);
        break;
      }
    }
  }

  return offscreen;
}

function loadSprites(){
  for(const [name, url] of Object.entries(SPRITE_URLS)){
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=>{
      try {
        const processed = removeBackground(img, 50);
        spriteImages[name] = processed;
      } catch(e){
        spriteImages[name] = img; // fallback to original if CORS blocks pixel access
      }
      spritesLoaded[name] = true;
    };
    img.onerror = ()=>{ spritesLoaded[name] = false; };
    img.src = url;
  }
}

// ==================== COLLISION ====================
function rectCollide(a,b){ return !(b.x>=a.x+a.w||b.x+b.w<=a.x||b.y>=a.y+a.h||b.y+b.h<=a.y); }

function handleCollisions() {
  player.onGround=false;
  const pr={x:player.x,y:player.y,w:player.width,h:player.height};
  for(let pl of platforms){
    const plr={x:pl.x,y:pl.y,w:pl.w,h:pl.h};
    if(!rectCollide(pr,plr)) continue;
    const dx=(pr.x+pr.w/2)-(plr.x+plr.w/2), dy=(pr.y+pr.h/2)-(plr.y+plr.h/2);
    const ox=(pr.w/2+plr.w/2)-Math.abs(dx), oy=(pr.h/2+plr.h/2)-Math.abs(dy);
    // Trigger question/brick when player is jumping into them from any direction
    let blockTriggered = false;
    if((pl.type==='question'||pl.type==='brick')&&player.vy<0){
      blockTriggered = true;
      if(pl.type==='question'&&pl.item){
        if(pl.item==='mushroom') items.push({x:pl.x+5,y:pl.y-30,w:28,h:28,vx:2,vy:-3,type:'mushroom'});
        else if(pl.item==='food') items.push({x:pl.x+5,y:pl.y-30,w:28,h:28,vx:2,vy:-3,type:'food'});
        else if(pl.item==='weapon') items.push({x:pl.x+5,y:pl.y-30,w:28,h:28,vx:0,vy:-3,type:'weapon'});
        else if(pl.item==='coin'){score+=200;coins++;spawnCoinParticles(pl.x+20,pl.y-10);}
        pl.type='used';pl.item=null;
      } else if(pl.type==='brick'){
        if(player.big){const idx=platforms.indexOf(pl);if(idx>-1){spawnBrickParticles(pl.x,pl.y);platforms.splice(idx,1);}score+=50;}
        else{pl.bumpAnim=8;} // Small player: bump animation
      }
      player.vy=2; // Bounce player down after hitting block
    }
    // Normal collision resolution (skip if block was destroyed)
    if(!blockTriggered||pl.type==='used'){
      if(ox<oy){ if(dx>0)player.x=plr.x+plr.w; else player.x=plr.x-player.width; player.vx=0; }
      else{
        if(dy>0){player.y=plr.y+plr.h;player.vy=0;}
        else{player.y=plr.y-player.height;player.vy=0;player.onGround=true;}
      }
    }
    pr.x=player.x;pr.y=player.y;
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;
    if(p.type!=='dust'&&p.type!=='snow'&&p.type!=='bubble')p.vy+=0.25;
    p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ==================== UPDATE ====================
let wasOnGround=false;

function update(){
  if(!gameActive) return;
  animFrame++;
  timerAcc++;if(timerAcc>=60){timerAcc=0;timer--;if(timer<=0&&!godMode){die();return;}}
  const stats=characters[currentChar];
  player.vy+=GRAVITY;if(player.vy>MAX_FALL)player.vy=MAX_FALL;
  player.x+=player.vx;player.y+=player.vy;
  if(player.x<0){player.x=0;player.vx=0;}
  if(player.y>600){if(godMode){player.y=50;player.vy=0;}else{die();return;}}
  handleCollisions();
  if(player.onGround&&!wasOnGround&&player.vy>2)spawnDust(player.x+player.width/2,player.y+player.height);
  wasOnGround=player.onGround;
  if(player.onGround)player.vx*=stats.friction; else player.vx*=0.98;
  if(Math.abs(player.vx)<0.1)player.vx=0;
  player.running=Math.abs(player.vx)>0.5;

  // Theme ambient particles
  const theme=THEMES[LEVEL_ORDER[currentLevel]];
  if(LEVEL_ORDER[currentLevel]==='snow'&&Math.random()<0.15) spawnSnowParticle(cameraX+Math.random()*W,-10);
  if(LEVEL_ORDER[currentLevel]==='water'&&Math.random()<0.08) spawnBubbleParticle(cameraX+Math.random()*W,530);

  // Enemies
  for(let e of enemies){
    if(!e.alive)continue;
    e.frame=(e.frame||0)+0.1;
    if(e.type==='bowser'){
      e.x+=e.vx*e.direction;
      const pl=currentLevel;
      const patrolL=pl===3?1950:pl===4?2250:pl===5?2650:pl===6?2300:pl===7?2050:pl===8?1900:1900;
      const patrolR=pl===3?2150:pl===4?2550:pl===5?2920:pl===6?2580:pl===7?2350:pl===8?2200:2200;
      if(e.x<patrolL)e.direction=1;if(e.x>patrolR)e.direction=-1;
      if(e.fireCooldown<=0&&Math.random()<0.025){
        fireballs.push({x:e.x+(e.direction>0?50:-20),y:e.y+30,vx:5.5*e.direction,vy:-2,w:18,h:18});
        e.fireCooldown=50;
      }
      if(e.fireCooldown>0)e.fireCooldown--;if(e.invincible>0)e.invincible--;
    } else if(e.type==='firebar'){
      e.angle+=e.speed;
      for(let i=1;i<=e.length;i+=8){
        const fx=e.centerX+Math.cos(e.angle)*i, fy=e.centerY+Math.sin(e.angle)*i;
        if(player.invincible<=0&&rectCollide({x:player.x,y:player.y,w:player.width,h:player.height},{x:fx-4,y:fy-4,w:8,h:8})){
          hurt();break;
        }
      }
      continue;
    } else if(e.type==='spike'){
      // Stationary hazard - just check collision
      if(player.invincible<=0&&rectCollide({x:player.x,y:player.y,w:player.width,h:player.height},{x:e.x,y:e.y,w:e.w,h:e.h})){
        hurt();
      }
      continue;
    } else if(e.type==='cheep'){
      // Underwater enemy: floats up and down
      e.x+=e.vx;
      e.y+=Math.sin(animFrame*0.03+e.x*0.01)*1.5;
      if(e.x<50||e.x>3400)e.vx*=-1;
    } else if(e.type==='koopa'){
      if(e.shell){
        e.x+=e.vx;
        for(let other of enemies){
          if(other===e||!other.alive||other.type==='bowser'||other.type==='firebar'||other.type==='spike')continue;
          if(rectCollide({x:e.x,y:e.y,w:e.w,h:e.h},{x:other.x,y:other.y,w:other.w,h:other.h})){
            other.alive=false;score+=200;
          }
        }
        if(e.x<50||e.x>3600)e.vx*=-1;
      } else {
        e.x+=e.vx;
        let onPlat=false;
        for(let pl of platforms){
          if((pl.type==='ground'||pl.type==='platform'||pl.type==='pipe'||pl.type==='stair')){
            if(e.y+e.h>pl.y&&e.y+e.h<pl.y+15&&e.x+e.w>pl.x&&e.x<pl.x+pl.w){e.y=pl.y-e.h;onPlat=true;}
          }
        }
        if(!onPlat)e.y+=4;
        if(e.x<50||e.x>3600)e.vx*=-1;
      }
    } else {
      e.x+=e.vx;
      let onPlat=false;
      for(let pl of platforms){
        if((pl.type==='ground'||pl.type==='platform'||pl.type==='pipe'||pl.type==='stair')){
          if(e.y+e.h>pl.y&&e.y+e.h<pl.y+15&&e.x+e.w>pl.x&&e.x<pl.x+pl.w){e.y=pl.y-e.h;onPlat=true;}
        }
      }
      if(!onPlat)e.y+=4;
      if(e.x<50||e.x>3600)e.vx*=-1;
    }

    // Player collision
    if(player.invincible<=0&&!godMode&&e.type!=='firebar'&&e.type!=='spike'){
      const pr={x:player.x,y:player.y,w:player.width,h:player.height};
      const er={x:e.x,y:e.y,w:e.w,h:e.h};
      if(rectCollide(pr,er)){
        if(player.vy>0&&player.y+player.height<=e.y+15){
          if(e.type==='goomba'||e.type==='cheep'){e.alive=false;score+=200;player.vy=-6;spawnDust(e.x+e.w/2,e.y+e.h);}
          else if(e.type==='koopa'){
            if(e.shell){e.vx=e.x<player.x?5:-5;player.vy=-5;}
            else{e.shell=true;e.vx=0;e.h=24;e.y+=18;player.vy=-5;score+=200;}
          }
          else if(e.type==='bowser'&&e.invincible<=0){
            e.health--;e.invincible=30;player.vy=-7;
            if(e.health<=0){e.alive=false;gameWin=true;gameActive=false;score+=5000;}
            else score+=500;
          }
        } else { hurt(); }
      }
    }

    // God mode: touching enemies destroys them (star power)
    if(godMode&&e.type!=='firebar'&&e.type!=='spike'){
      const pr={x:player.x,y:player.y,w:player.width,h:player.height};
      const er={x:e.x,y:e.y,w:e.w,h:e.h};
      if(rectCollide(pr,er)){
        if(e.type==='goomba'||e.type==='cheep'){e.alive=false;score+=200;spawnCoinParticles(e.x+e.w/2,e.y);}
        else if(e.type==='koopa'){e.alive=false;score+=200;spawnCoinParticles(e.x+e.w/2,e.y);}
        else if(e.type==='bowser'&&e.invincible<=0){
          e.health-=2;e.invincible=30;
          if(e.health<=0){e.alive=false;gameWin=true;gameActive=false;score+=5000;}
          else score+=500;
        }
      }
    }
  }

  // Fireballs
  for(let i=fireballs.length-1;i>=0;i--){
    const f=fireballs[i];f.x+=f.vx;f.y+=f.vy;f.vy+=0.15;
    spawnFireParticle(f.x+f.w/2,f.y+f.h/2);
    if(f.y>500){fireballs.splice(i,1);continue;}
    if(!godMode&&player.invincible<=0&&rectCollide({x:player.x,y:player.y,w:player.width,h:player.height},{x:f.x,y:f.y,w:f.w,h:f.h})){hurt();fireballs.splice(i,1);}
  }

  // Player projectiles (weapon)
  if(player.weaponCooldown>0)player.weaponCooldown--;
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];p.x+=p.vx;p.life--;
    spawnFireParticle(p.x+p.w/2,p.y+p.h/2);
    if(p.life<=0||p.x<cameraX-50||p.x>cameraX+W+50){projectiles.splice(i,1);continue;}
    // Hit enemies
    for(let e of enemies){
      if(!e.alive||e.type==='firebar')continue;
      if(rectCollide({x:p.x,y:p.y,w:p.w,h:p.h},{x:e.x,y:e.y,w:e.w,h:e.h})){
        if(e.type==='bowser'&&e.invincible<=0){
          e.health-=2;e.invincible=30;
          if(e.health<=0){e.alive=false;gameWin=true;gameActive=false;score+=5000;}
          else score+=500;
        } else if(e.type==='koopa'&&e.shell){e.vx=p.vx>0?6:-6;}
        else {e.alive=false;score+=200;}
        spawnCoinParticles(p.x,p.y);
        projectiles.splice(i,1);break;
      }
    }
  }

  // Items
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];it.x+=it.vx;it.y+=it.vy;it.vy+=0.25;
    for(let pl of platforms){
      if((pl.type==='ground'||pl.type==='platform'||pl.type==='pipe'||pl.type==='stair')&&
         it.y+it.h>pl.y&&it.y+it.h<pl.y+15&&it.x+it.w>pl.x&&it.x<pl.x+pl.w){it.y=pl.y-it.h;it.vy=-4;}
    }
    if(it.x<cameraX-50||it.x>cameraX+W+50){items.splice(i,1);continue;}
    if(rectCollide({x:player.x,y:player.y,w:player.width,h:player.height},{x:it.x,y:it.y,w:it.w,h:it.h})){
      if(it.type==='mushroom'&&!player.big){player.big=true;player.height=56;player.width=36;player.y-=14;score+=1000;spawnCoinParticles(player.x+player.width/2,player.y);}
      else if(it.type==='food'){if(!player.big){player.big=true;player.height=56;player.width=36;player.y-=14;}player.invincible=Math.max(player.invincible,300);score+=500;spawnCoinParticles(player.x+player.width/2,player.y);}
      else if(it.type==='weapon'){player.hasWeapon=true;player.weaponCooldown=0;score+=300;spawnCoinParticles(player.x+player.width/2,player.y);}
      items.splice(i,1);
    }
  }

  // Lava particles
  if(THEMES[LEVEL_ORDER[currentLevel]].lava) for(let gx=0;gx<3200;gx+=8){if(Math.random()<0.02)spawnLavaParticle(gx,530);}

  // Flagpole
  const flagX=getFlagX(currentLevel);
  if(player.x>flagX&&!gameWin&&!levelComplete){
    levelComplete=true;gameActive=false;gameWin=true;
    score+=Math.floor(timer)*50;
  }

  if(player.invincible>0)player.invincible--;
  cameraX=Math.min(Math.max(player.x-350,0),getMaxCamera(currentLevel));
  updateParticles();updateHUD();
}

function hurt(){
  if(player.invincible>0||godMode)return;
  if(player.big){player.big=false;player.height=42;player.width=30;player.invincible=90;}
  else{lives--;if(lives<=0){gameOver=true;gameActive=false;}else{player.x=60;player.y=350;player.vx=0;player.vy=0;player.invincible=90;}}
  updateHUD();
}

function die(){lives=0;gameActive=false;gameOver=true;updateHUD();}

function advanceLevel(){
  currentLevel++;
  if(currentLevel>=LEVEL_COUNT) currentLevel=0;
  levelTransition=true;
  transitionTimer=180;
}

// ==================== DRAWING ====================
function draw(){
  const theme=THEMES[LEVEL_ORDER[currentLevel]];

  const skyGrad=ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,theme.sky[0]);skyGrad.addColorStop(0.7,theme.sky[1]);skyGrad.addColorStop(1,theme.sky[2]);
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H);

  // Lava
  if(theme.lava){
    const lavaGrad=ctx.createLinearGradient(0,H-40,0,H);
    lavaGrad.addColorStop(0,'#ff4400');lavaGrad.addColorStop(0.5,'#ff6600');lavaGrad.addColorStop(1,'#ff8800');
    ctx.fillStyle=lavaGrad;ctx.fillRect(0,530,W,30);
    ctx.fillStyle='rgba(255,100,0,0.15)';ctx.fillRect(0,480,W,60);
  }

  // Water overlay for underwater level
  if(LEVEL_ORDER[currentLevel]==='water'){
    ctx.fillStyle='rgba(0,60,120,0.2)';ctx.fillRect(0,0,W,H);
  }

  clouds.forEach(c=>{
    const cx=((c.x-cameraX*c.speed)%(W+200))-100;
    drawCloud(cx,c.y,c.w,theme);
  });

  hills.forEach(h=>{
    const hx=((h.x-cameraX*0.3)%3200)-200;
    ctx.fillStyle=theme.hillColor;ctx.beginPath();ctx.ellipse(hx+h.w/2,500,h.w/2,h.h,0,Math.PI,0);ctx.fill();
    ctx.fillStyle=theme.hillInner;ctx.beginPath();ctx.ellipse(hx+h.w/2,500,h.w/2-10,h.h-15,0,Math.PI,0);ctx.fill();
  });

  ctx.save();ctx.translate(-cameraX,0);

  bushes.forEach(b=>{
    ctx.fillStyle=theme.bushColor;ctx.beginPath();ctx.ellipse(b.x,480,b.w/2,b.h,0,Math.PI,0);ctx.fill();
    ctx.fillStyle=theme.bushLight;
    ctx.beginPath();ctx.ellipse(b.x-b.w*0.2,480,b.w*0.35,b.h*0.8,0,Math.PI,0);ctx.fill();
    ctx.beginPath();ctx.ellipse(b.x+b.w*0.2,480,b.w*0.35,b.h*0.8,0,Math.PI,0);ctx.fill();
  });

  platforms.forEach(p=>{
    if(p.x+p.w<cameraX-50||p.x>cameraX+W+50)return;
    if(p.type==='ground')drawGroundTile(p,theme);
    else if(p.type==='platform')drawPlatformTile(p,theme);
    else if(p.type==='brick')drawBrick(p,theme);
    else if(p.type==='question')drawQuestionBlock(p);
    else if(p.type==='used')drawUsedBlock(p);
    else if(p.type==='pipe')drawPipe(p,theme);
    else if(p.type==='stair')drawStairBlock(p,theme);
    else if(p.type==='flagpole')drawFlagpole(p);
    else if(p.type==='castle')drawCastle(p);
  });

  items.forEach(it=>{
    if(it.type==='mushroom'){
      const mushImg=spriteImages.mushroom;
      if(mushImg&&spritesLoaded.mushroom){ctx.drawImage(mushImg,it.x-2,it.y-2,it.w+8,it.h+8);}
      else drawSprite(ctx,MUSHROOM,{R:'#e52521',W:'#ffffff',S:'#fcbcb0'},it.x,it.y,3,false);
    } else if(it.type==='food'){
      const mushImg=spriteImages.mushroom;
      if(mushImg&&spritesLoaded.mushroom){ctx.drawImage(mushImg,it.x-2,it.y-2,it.w+8,it.h+8);}
      else drawSprite(ctx,MUSHROOM,{R:'#ff6600',W:'#ffcc00',S:'#ffdd44'},it.x,it.y,3,false);
    } else if(it.type==='weapon'){
      const wuqiImg=spriteImages.wuqi;
      if(wuqiImg&&spritesLoaded.wuqi){
        ctx.drawImage(wuqiImg,it.x-2,it.y-2,it.w+8,it.h+8);
      } else {
        drawSprite(ctx,MUSHROOM,{R:'#3399ff',W:'#ffffff',S:'#99ccff'},it.x,it.y,3,false);
      }
    }
  });

  enemies.forEach(e=>{
    if(!e.alive)return;
    if(e.type!=='firebar'&&e.x+e.w<cameraX-50||e.x>cameraX+W+50)return;
    if(e.type==='goomba'){
      const frame=Math.floor(e.frame)%2===0?GOOMBA_W1:GOOMBA_W2;
      drawSprite(ctx,frame,{T:'#c88b3a',D:'#6b4226',W:'#ffffff',O:'#000000',K:'#4a3000'},e.x,e.y,2.5,e.vx<0);
    } else if(e.type==='cheep'){
      const frame=Math.floor(e.frame)%2===0?CHEEP_CHEEP:CHEEP_CHEEP;
      drawSprite(ctx,frame,{R:'#e55050',O:'#000000',W:'#ffffff'},e.x,e.y,2.5,e.vx<0);
    } else if(e.type==='spike'){
      drawSprite(ctx,SPIKE,{S:'#888',R:'#e52521'},e.x,e.y,2.5,false);
    } else if(e.type==='koopa'){
      if(e.shell){
        drawSprite(ctx,KOOPA_SHELL,{G:'#39b54a',Y:'#f5a623'},e.x,e.y,2.5,false);
      } else {
        const frame=Math.floor(e.frame)%2===0?KOOPA_W1:KOOPA_W2;
        drawSprite(ctx,frame,{G:'#39b54a',Y:'#f5a623',W:'#ffffff',O:'#000000'},e.x,e.y,2.5,e.vx<0);
      }
    } else if(e.type==='bowser'){
      if(e.invincible>0&&Math.floor(e.invincible)%4<2)return;
      const bowserImg=spriteImages.bowser;
      if(bowserImg&&spritesLoaded.bowser){
        ctx.save();
        if(e.direction<0){ctx.translate(e.x-10+e.w+20,e.y-10);ctx.scale(-1,1);}
        else{ctx.translate(e.x-10,e.y-10);}
        ctx.drawImage(bowserImg,0,0,e.w+20,e.h+20);
        ctx.restore();
      } else {
        drawSprite(ctx,BOWSER,{V:'#2d5a27',Y:'#f5a623',O:'#000000',F:'#e74c3c',K:'#4a3000'},e.x-10,e.y-10,3.5,e.direction<0);
      }
      // Health bar
      const maxHP=currentLevel===9?8:currentLevel===8?7:currentLevel===7?7:currentLevel===6?6:currentLevel===5?6:currentLevel===4?5:currentLevel===3?6:currentLevel===2?5:currentLevel===1?4:3;
      ctx.fillStyle='#333';ctx.fillRect(e.x,e.y-20,e.w,8);
      ctx.fillStyle='#2ecc71';ctx.fillRect(e.x,e.y-20,e.w*(e.health/maxHP),8);
      ctx.strokeStyle='#fff';ctx.strokeRect(e.x,e.y-20,e.w,8);
    } else if(e.type==='firebar'){
      for(let i=0;i<e.length;i+=8){
        const fx=e.centerX+Math.cos(e.angle)*i, fy=e.centerY+Math.sin(e.angle)*i;
        const alpha=1-i/e.length*0.3;
        ctx.fillStyle=`rgba(255,${Math.floor(80+120*(1-i/e.length))},0,${alpha})`;
        ctx.beginPath();ctx.arc(fx,fy,5-i/e.length*2,0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle='#888';ctx.beginPath();ctx.arc(e.centerX,e.centerY,6,0,Math.PI*2);ctx.fill();
    }
  });

  fireballs.forEach(f=>{
    const grad=ctx.createRadialGradient(f.x+f.w/2,f.y+f.h/2,2,f.x+f.w/2,f.y+f.h/2,f.w);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.3,'#ff6600');grad.addColorStop(0.7,'#ff0000');grad.addColorStop(1,'rgba(153,0,0,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(f.x+f.w/2,f.y+f.h/2,f.w/2,0,Math.PI*2);ctx.fill();
  });

  // Player projectiles
  projectiles.forEach(p=>{
    const grad=ctx.createRadialGradient(p.x+p.w/2,p.y+p.h/2,1,p.x+p.w/2,p.y+p.h/2,p.w);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.3,'#33ccff');grad.addColorStop(0.7,'#0066ff');grad.addColorStop(1,'rgba(0,50,153,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(p.x+p.w/2,p.y+p.h/2,p.w/2,0,Math.PI*2);ctx.fill();
  });

  particles.forEach(p=>{
    const alpha=p.life/p.maxLife;
    if(p.type==='coin'){ctx.fillStyle=`rgba(247,212,74,${alpha})`;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}
    else if(p.type==='brick'){ctx.fillStyle=`rgba(200,76,12,${alpha})`;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.life*0.15);ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore();}
    else if(p.type==='dust'){ctx.fillStyle=`rgba(255,255,255,${alpha*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);ctx.fill();}
    else if(p.type==='fire'){ctx.fillStyle=`rgba(255,${Math.floor(100+155*alpha)},0,${alpha})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);ctx.fill();}
    else if(p.type==='lava'){ctx.fillStyle=`rgba(255,${Math.floor(50+100*alpha)},0,${alpha})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);ctx.fill();}
    else if(p.type==='snow'){ctx.fillStyle=`rgba(255,255,255,${alpha*0.8})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
    else if(p.type==='bubble'){ctx.strokeStyle=`rgba(150,200,255,${alpha*0.6})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.stroke();}
  });

  drawPlayer();

  // God mode golden aura
  if(godMode){
    const px=player.x+player.width/2, py=player.y+player.height/2;
    const grad=ctx.createRadialGradient(px,py,5,px,py,40);
    grad.addColorStop(0,'rgba(255,215,0,0.3)');
    grad.addColorStop(0.5,'rgba(255,165,0,0.15)');
    grad.addColorStop(1,'rgba(255,215,0,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(px,py,40,0,Math.PI*2);ctx.fill();
    // Sparkle ring
    for(let i=0;i<6;i++){
      const angle=animFrame*0.05+i*Math.PI/3;
      const dist=28+Math.sin(animFrame*0.1+i)*6;
      const sx=px+Math.cos(angle)*dist, sy=py+Math.sin(angle)*dist;
      ctx.fillStyle=`rgba(255,215,0,${0.5+Math.sin(animFrame*0.2+i)*0.4})`;
      ctx.beginPath();ctx.arc(sx,sy,2.5,0,Math.PI*2);ctx.fill();
    }
  }
  // Food invincibility rainbow aura (when not in god mode)
  if(!godMode&&player.invincible>0){
    const px=player.x+player.width/2, py=player.y+player.height/2;
    const colors=['rgba(255,0,0,','rgba(255,165,0,','rgba(255,255,0,','rgba(0,200,0,','rgba(0,100,255,','rgba(150,0,255,'];
    for(let i=0;i<6;i++){
      const angle=animFrame*0.08+i*Math.PI/3;
      const dist=22+Math.sin(animFrame*0.15+i)*5;
      const sx=px+Math.cos(angle)*dist, sy=py+Math.sin(angle)*dist;
      const alpha=0.4+Math.sin(animFrame*0.2+i)*0.3;
      ctx.fillStyle=colors[i]+alpha+')';
      ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.restore();

  // Cheat toast notification
  if(cheatToastTimer>0){
    cheatToastTimer--;
    const alpha=Math.min(1,cheatToastTimer/30);
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,0,0,0.8)';
    const tw=ctx.measureText(cheatToast).width||400;
    ctx.fillRect(W/2-tw/2-20,H/2+100,tw+40,40);
    ctx.strokeStyle=godMode?'#f1c40f':'#888';ctx.lineWidth=2;
    ctx.strokeRect(W/2-tw/2-20,H/2+100,tw+40,40);
    ctx.fillStyle=godMode?'#f1c40f':'#aaa';
    ctx.font='14px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText(cheatToast,W/2,H/2+126);
    ctx.textAlign='left';
    ctx.restore();
  }

  // Overlays
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e74c3c';ctx.font='48px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-20);
    ctx.fillStyle='#fff';ctx.font='14px "Press Start 2P",monospace';
    ctx.fillText('SCORE: '+score,W/2,H/2+20);
    ctx.fillText('按空格重新开始',W/2,H/2+50);
    ctx.textAlign='left';
  }

  if(gameWin){
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f1c40f';ctx.font='36px "Press Start 2P",monospace';ctx.textAlign='center';
    if(currentLevel>=LEVEL_COUNT-1){
      ctx.fillText('🏆 GAME COMPLETE!',W/2,H/2-50);
      ctx.fillStyle='#fff';ctx.font='16px "Press Start 2P",monospace';
      ctx.fillText('恭喜通关全部10关!',W/2,H/2);
      ctx.fillText('最终分数: '+score,W/2,H/2+30);
      ctx.fillText('按空格重新开始',W/2,H/2+60);
    } else {
      ctx.fillText(' COURSE CLEAR!',W/2,H/2-50);
      ctx.fillStyle='#fff';ctx.font='14px "Press Start 2P",monospace';
      ctx.fillText(LEVEL_NAMES[currentLevel]+' 完成!',W/2,H/2-10);
      ctx.fillText('TIME BONUS: +'+Math.floor(timer)*50,W/2,H/2+20);
      ctx.fillText('SCORE: '+score,W/2,H/2+50);
      ctx.fillText('按空格进入下一关',W/2,H/2+80);
    }
    ctx.textAlign='left';
  }

  if(levelTransition){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='24px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('WORLD ' + LEVEL_NAMES[currentLevel],W/2,H/2-20);
    ctx.font='16px "Press Start 2P",monospace';
    ctx.fillText(THEMES[LEVEL_ORDER[currentLevel]].name,W/2,H/2+20);
    ctx.fillText('❤️ ×'+lives,W/2,H/2+55);
    // Level progress bar
    const barW=400, barH=12, barX=(W-barW)/2, barY=H/2+80;
    ctx.fillStyle='#333';ctx.fillRect(barX,barY,barW,barH);
    ctx.fillStyle='#e74c3c';ctx.fillRect(barX,barY,barW*(currentLevel/LEVEL_COUNT),barH);
    ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.strokeRect(barX,barY,barW,barH);
    ctx.textAlign='left';
  }
}

function drawCloud(x,y,w,theme){
  ctx.fillStyle=theme.cloudColor;
  ctx.beginPath();ctx.ellipse(x,y,w/2,w/4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x-w*0.25,y+5,w*0.3,w/5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+w*0.25,y+3,w*0.35,w/5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=theme.cloudShadow;
  ctx.beginPath();ctx.ellipse(x,y+w*0.08,w*0.35,w/8,0,0,Math.PI*2);ctx.fill();
}

function drawGroundTile(p,theme){
  ctx.fillStyle=theme.groundTop;ctx.fillRect(p.x,p.y,p.w,6);
  ctx.fillStyle=theme.groundEdge;ctx.fillRect(p.x,p.y+4,p.w,4);
  ctx.fillStyle=theme.groundBody;ctx.fillRect(p.x,p.y+8,p.w,p.h-8);
  ctx.fillStyle=theme.groundTex;
  for(let tx=p.x+4;tx<p.x+p.w;tx+=12){ctx.fillRect(tx,p.y+16,6,4);ctx.fillRect(tx+3,p.y+28,6,4);}
}

function drawPlatformTile(p,theme){
  ctx.fillStyle=theme.platformTop;ctx.fillRect(p.x,p.y,p.w,6);
  ctx.fillStyle=theme.platformEdge;ctx.fillRect(p.x,p.y+4,p.w,3);
  ctx.fillStyle=theme.platformBody;ctx.fillRect(p.x,p.y+7,p.w,p.h-7);
  ctx.fillStyle=theme.groundBody;ctx.fillRect(p.x,p.y+7,3,p.h-7);ctx.fillRect(p.x+p.w-3,p.y+7,3,p.h-7);
}

function drawBrick(p,theme){
  const bumpOff = (p.bumpAnim||0) > 0 ? -Math.sin((p.bumpAnim)/8*Math.PI)*6 : 0;
  if(p.bumpAnim>0) p.bumpAnim--;
  const bx=p.x, by=p.y+bumpOff;
  ctx.fillStyle=theme.brickBase;ctx.fillRect(bx,by,p.w,p.h);
  ctx.fillStyle=theme.brickMortar;
  ctx.fillRect(bx,by,p.w,2);ctx.fillRect(bx,by+p.h/2-1,p.w,2);ctx.fillRect(bx,by+p.h-2,p.w,2);
  ctx.fillRect(bx+p.w/2-1,by,2,p.h/2);ctx.fillRect(bx,by+p.h/2,2,p.h/2);ctx.fillRect(bx+p.w-2,by+p.h/2,2,p.h/2);
  ctx.fillStyle=theme.brickHighlight;ctx.fillRect(bx+2,by+2,p.w/2-3,p.h/2-3);
  ctx.strokeStyle=theme.brickMortar;ctx.lineWidth=1.5;ctx.strokeRect(bx+0.5,by+0.5,p.w-1,p.h-1);
}

function drawQuestionBlock(p){
  const bounce=Math.sin(animFrame*0.08+(p.animOffset||0))*1.5;
  const py=p.y+(p.item?bounce:0);
  ctx.fillStyle='#c88b3a';ctx.fillRect(p.x+2,py+2,p.w,p.h);
  ctx.fillStyle='#f7d44a';ctx.fillRect(p.x,py,p.w,p.h);
  ctx.fillStyle='#e0b830';ctx.fillRect(p.x+3,py+3,p.w-6,p.h-6);
  ctx.fillStyle='#fff';ctx.font='bold 22px monospace';ctx.textAlign='center';
  ctx.fillText('?',p.x+p.w/2,py+p.h-10);
  ctx.fillStyle='#c88b3a';ctx.fillText('?',p.x+p.w/2+1,py+p.h-9);ctx.textAlign='left';
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(p.x+4,py+4,8,8);
  ctx.strokeStyle='#c88b3a';ctx.lineWidth=2;ctx.strokeRect(p.x+0.5,py+0.5,p.w-1,p.h-1);
}

function drawUsedBlock(p){
  ctx.fillStyle='#886644';ctx.fillRect(p.x,p.y,p.w,p.h);
  ctx.fillStyle='#775533';ctx.fillRect(p.x+3,p.y+3,p.w-6,p.h-6);
  ctx.strokeStyle='#554422';ctx.lineWidth=1.5;ctx.strokeRect(p.x+0.5,p.y+0.5,p.w-1,p.h-1);
}

function drawPipe(p,theme){
  const grad=ctx.createLinearGradient(p.x,0,p.x+p.w,0);
  grad.addColorStop(0,theme.pipeBody);grad.addColorStop(0.2,theme.pipeLight);
  grad.addColorStop(0.5,theme.pipeBody);grad.addColorStop(0.8,theme.pipeLight);grad.addColorStop(1,theme.pipeBody);
  ctx.fillStyle=grad;ctx.fillRect(p.x,p.y,p.w,p.h);
  const rimGrad=ctx.createLinearGradient(p.x-6,0,p.x+p.w+6,0);
  rimGrad.addColorStop(0,theme.pipeRim);rimGrad.addColorStop(0.3,theme.pipeRimLight);
  rimGrad.addColorStop(0.7,theme.pipeRimLight);rimGrad.addColorStop(1,theme.pipeRim);
  ctx.fillStyle=rimGrad;ctx.fillRect(p.x-6,p.y,p.w+12,14);
  ctx.strokeStyle=theme.pipeRim;ctx.lineWidth=2;
  ctx.strokeRect(p.x-6,p.y,p.w+12,14);ctx.strokeRect(p.x,p.y+12,p.w,p.h-12);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(p.x+6,p.y+16,8,p.h-20);
}

function drawStairBlock(p,theme){
  ctx.fillStyle=theme.stairColor;ctx.fillRect(p.x,p.y,p.w,p.h);
  ctx.fillStyle=theme.stairLight;ctx.fillRect(p.x+2,p.y+2,p.w-4,p.h-4);
  ctx.strokeStyle=theme.stairDark;ctx.lineWidth=1;ctx.strokeRect(p.x+0.5,p.y+0.5,p.w-1,p.h-1);
  ctx.fillStyle=theme.stairDark;ctx.fillRect(p.x+p.w/2-1,p.y+2,2,p.h-4);ctx.fillRect(p.x+2,p.y+p.h/2-1,p.w-4,2);
}

function drawFlagpole(p){
  ctx.fillStyle='#888';ctx.fillRect(p.x+2,p.y,4,p.h);
  ctx.fillStyle='#f7d44a';ctx.beginPath();ctx.arc(p.x+4,p.y,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#39b54a';ctx.beginPath();ctx.moveTo(p.x+4,p.y+8);ctx.lineTo(p.x+30,p.y+18);ctx.lineTo(p.x+4,p.y+28);ctx.fill();
}

function drawCastle(p){
  ctx.fillStyle='#c8a060';ctx.fillRect(p.x,p.y+40,p.w,p.h-40);
  for(let bx=p.x;bx<p.x+p.w;bx+=40)ctx.fillRect(bx,p.y,24,60);
  ctx.fillStyle='#4a3000';ctx.beginPath();
  ctx.moveTo(p.x+p.w/2-20,p.y+p.h);ctx.lineTo(p.x+p.w/2-20,p.y+p.h-50);
  ctx.arc(p.x+p.w/2,p.y+p.h-50,20,Math.PI,0);ctx.lineTo(p.x+p.w/2+20,p.y+p.h);ctx.fill();
  ctx.fillStyle='#87ceeb';ctx.fillRect(p.x+p.w/2-8,p.y+60,16,20);
  ctx.strokeStyle='#4a3000';ctx.lineWidth=2;ctx.strokeRect(p.x+p.w/2-8,p.y+60,16,20);
  ctx.strokeStyle='#8a6a30';ctx.lineWidth=2;ctx.strokeRect(p.x,p.y,p.w,p.h);
}

function drawPlayer(){
  if(player.invincible>0&&Math.floor(player.invincible)%6<3)return;
  const px=player.x, py=player.y, flipX=player.facing<0;
  const drawW=player.big?48:36, drawH=player.big?56:42;
  const offsetY=player.big?-14:0;
  const imgKey=currentChar;
  const img=spriteImages[imgKey];

  if(img&&spritesLoaded[imgKey]){
    ctx.save();
    if(flipX){ctx.translate(px+drawW,py+offsetY);ctx.scale(-1,1);} else {ctx.translate(px,py+offsetY);}
    ctx.drawImage(img,0,0,drawW,drawH);
    ctx.restore();
  } else {
    // Fallback to pixel art
    const stats=characters[currentChar], pal=stats.pal;
    let sprite;
    if(!player.onGround) sprite=currentChar==='mario'?MARIO_JUMP:LUIGI_JUMP;
    else if(player.running) sprite=(Math.floor(animFrame/6)%2===0)?(currentChar==='mario'?MARIO_RUN:LUIGI_RUN):(currentChar==='mario'?MARIO_STAND:LUIGI_STAND);
    else sprite=currentChar==='mario'?MARIO_STAND:LUIGI_STAND;
    const scale=player.big?4:3;
    drawSprite(ctx,sprite,pal,px,py+offsetY,scale,flipX);
  }
}

// ==================== INPUT ====================
const keys={left:false,right:false,up:false};
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')keys.left=true;
  if(e.key==='ArrowRight')keys.right=true;
  if(e.key==='ArrowUp')keys.up=true;
  if(e.key===' '){e.preventDefault();handleSpace();}
  if((e.key==='f'||e.key==='F')&&gameActive&&player.hasWeapon&&player.weaponCooldown<=0){
    player.weaponCooldown=20;
    projectiles.push({x:player.x+player.facing*20,y:player.y+10,vx:player.facing*8,vy:0,w:16,h:16,life:120});
  }

  // Cheat code detection (999)
  if(e.key.length===1&&/[0-9]/.test(e.key)){
    cheatBuffer.push(e.key);
    if(cheatBuffer.length>CHEAT_CODE.length)cheatBuffer.shift();
    if(cheatBuffer.join('')===CHEAT_CODE.join('')){
      godMode=!godMode;
      cheatBuffer=[];
      cheatToast=godMode?'⚡ GOD MODE ON!':'GOD MODE OFF';
      cheatToastTimer=120;
      player.invincible=godMode?999999:90;
      updateHUD();
    }
  }
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')keys.left=false;
  if(e.key==='ArrowRight')keys.right=false;
  if(e.key==='ArrowUp')keys.up=false;
});

function addTouch(id,onDown,onUp){
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();onDown();});
  el.addEventListener('touchend',e=>{e.preventDefault();onUp();});
  el.addEventListener('mousedown',onDown);el.addEventListener('mouseup',onUp);
}
addTouch('btnLeft',()=>keys.left=true,()=>keys.left=false);
addTouch('btnRight',()=>keys.right=true,()=>keys.right=false);
addTouch('btnJump',()=>keys.up=true,()=>keys.up=false);

function handleInput(){
  if(!gameActive)return;
  const stats=characters[currentChar];
  const accel=player.onGround?stats.moveSpeed:stats.moveSpeed*stats.airControl;
  if(keys.left){player.vx=Math.max(player.vx-accel,-stats.moveSpeed*1.3);player.facing=-1;}
  if(keys.right){player.vx=Math.min(player.vx+accel,stats.moveSpeed*1.3);player.facing=1;}
  if(keys.up&&player.onGround){player.vy=stats.jumpForce;player.onGround=false;spawnDust(player.x+player.width/2,player.y+player.height);}
  if(!keys.up&&player.vy<-3)player.vy*=0.85;
}

function handleSpace(){
  if(levelTransition)return;
  if(gameOver){currentLevel=0;resetGame();return;}
  if(gameWin){
    if(currentLevel>=LEVEL_COUNT-1){currentLevel=0;resetGame();}
    else{advanceLevel();}
    return;
  }
  resetGame();
}

function resetGame(){lives=3;coins=0;score=0;currentLevel=0;buildLevel();gameActive=true;gameWin=gameOver=false;}

function gameLoop(){
  if(levelTransition){
    transitionTimer--;
    if(transitionTimer<=0){levelTransition=false;buildLevel();}
  }
  if(gameActive){handleInput();update();}
  draw();
  requestAnimationFrame(gameLoop);
}

document.getElementById('selectMario').addEventListener('click',()=>{
  currentChar='mario';document.getElementById('selectMario').classList.add('active');
  document.getElementById('selectLuigi').classList.remove('active');resetGame();
});
document.getElementById('selectLuigi').addEventListener('click',()=>{
  currentChar='luigi';document.getElementById('selectLuigi').classList.add('active');
  document.getElementById('selectMario').classList.remove('active');resetGame();
});
document.getElementById('restartBtn').addEventListener('click',resetGame);

buildLevel();gameLoop();
})();
</script>
