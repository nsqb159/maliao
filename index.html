<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🍄 超级马力欧 · 全贴图豪华版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      background: #0b0a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    .game-container {
      background: #1e1b3a;
      padding: 24px;
      border-radius: 48px;
      box-shadow: 0 20px 0 #0f0c1e, 0 30px 40px #00000080;
      border: 3px solid #6d5c9e;
    }
    canvas {
      display: block;
      margin: 0 auto;
      width: 960px;
      height: 540px;
      image-rendering: crisp-edges;
      border-radius: 24px;
      box-shadow: inset 0 0 0 3px #2a2340, 0 0 0 4px #a48cc0;
      background: #5c94fc;
      cursor: pointer;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 18px 12px 4px 12px;
      color: #ffe484;
      text-shadow: 3px 3px 0 #aa4e1c;
      font-size: 22px;
    }
    .controls {
      display: flex;
      gap: 30px;
      background: #1a1530cc;
      padding: 8px 28px;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      border: 2px solid #b89ad0;
      color: #dfc9ff;
      font-size: 16px;
    }
    button {
      background: #f5c542;
      border: none;
      color: #1d1135;
      font-weight: bold;
      font-size: 20px;
      padding: 10px 30px;
      border-radius: 50px;
      box-shadow: 0 7px 0 #9e6018;
      cursor: pointer;
      font-family: inherit;
      border: 3px solid #ffeaa6;
      transition: 0.05s linear;
      letter-spacing: 1px;
    }
    button:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #9e6018;
    }
    .character-select {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }
    .char-btn {
      background: #3f3264;
      color: white;
      box-shadow: 0 5px 0 #1e1530;
      font-size: 16px;
      padding: 8px 24px;
    }
    .char-btn.active {
      background: #e74c3c;
      box-shadow: 0 5px 0 #7b241c;
    }
    .toad-msg {
      color: #ffd966;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <div class="character-select">
      <button id="selectMario" class="char-btn active">🔴 马里奥</button>
      <button id="selectLuigi" class="char-btn">🟢 路易吉</button>
    </div>
    <div class="toad-msg" id="toadMessage">🍄奇诺比奥: “公主在另一座城堡!”</div>
  </div>
  <canvas id="gameCanvas" width="960" height="540"></canvas>
  <div class="status-bar">
    <span>❤️ <span id="livesDisplay">3</span> &nbsp;&nbsp;⭐ <span id="scoreDisplay">00000</span></span>
    <span id="stateDisplay">🏃 RUN!</span>
    <div class="controls">
      <span>←→移动</span>
      <span>↑跳跃</span>
    </div>
    <button id="restartBtn">🔄 重新开始</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const livesSpan = document.getElementById('livesDisplay');
    const scoreSpan = document.getElementById('scoreDisplay');
    const stateDisplay = document.getElementById('stateDisplay');

    // ---------- 贴图配置 (使用你提供的马里奥、路易吉 + 网络稳定直链) ----------
    const imagePaths = {
      mario:   { url: 'https://github.com/nsqb159/maliao/raw/main/icon.png' },
      luigi:   { url: 'https://github.com/nsqb159/maliao/raw/main/1%20(2).png' },
      goomba:  { url: 'https://i.ibb.co/S0Xz8Pb/goomba.png' },           // 栗宝宝 (网络直链)
      bowser:  { url: 'https://i.ibb.co/0j0ZkHc/bowser.png' },           // 库巴
      mushroom:{ url: 'https://i.ibb.co/Cn8K40N/mushroom.png' },         // 蘑菇
      coin:    { url: 'https://i.ibb.co/HXbN4K0/coin.png' },             // 金币
      peach:   { url: 'https://i.ibb.co/LQ6nz5L/peach.png' },            // 碧姬公主
      toad:    { url: 'https://i.ibb.co/qJp2XQV/toad.png' },             // 奇诺比奥
      tiles:   { url: 'https://i.ibb.co/1Gz0tK1/tiles.png' }            // 场景图块集 (18x18)
    };

    // 预加载所有图片
    const images = {};
    let loadedCount = 0;
    const totalImages = Object.keys(imagePaths).length;

    function loadAllImages(callback) {
      if (totalImages === 0) return callback();
      for (let key in imagePaths) {
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        img.onload = () => {
          loadedCount++;
          if (loadedCount === totalImages) callback();
        };
        img.onerror = () => {
          console.warn(`图片加载失败: ${key}, 将使用纯色代替`);
          loadedCount++;
          if (loadedCount === totalImages) callback();
        };
        img.src = imagePaths[key].url;
        images[key] = img;
      }
    }

    // ---------- 角色参数 ----------
    const characters = {
      mario: { jumpForce: -9.8, moveSpeed: 4.5, friction: 0.72, name: 'MARIO' },
      luigi: { jumpForce: -11.0, moveSpeed: 4.8, friction: 0.65, name: 'LUIGI' }
    };
    let currentChar = 'mario';

    const GRAVITY = 0.55;
    const MAX_FALL = 12;

    let gameActive = false;
    let gameWin = false;
    let gameOver = false;
    let levelComplete = false;

    let player = {
      x: 60, y: 350, vx: 0, vy: 0,
      width: 32, height: 32,
      big: false,
      onGround: false,
      facing: 1,
      invincible: 0,
    };

    let platforms = [];
    let enemies = [];
    let items = [];
    let fireballs = [];

    let score = 0;
    let lives = 3;
    let cameraX = 0;
    let toadTalkTimer = 0;

    // ---------- 关卡构建 ----------
    function buildLevel() {
      platforms = [];
      enemies = [];
      items = [];
      fireballs = [];

      // 大地
      platforms.push({ x: 0, y: 480, w: 2800, h: 60, type: 'floor' });

      // 浮动平台
      platforms.push({ x: 200, y: 410, w: 110, h: 20, type: 'floor' });
      platforms.push({ x: 380, y: 340, w: 90, h: 20, type: 'floor' });
      platforms.push({ x: 520, y: 270, w: 80, h: 20, type: 'floor' });
      platforms.push({ x: 680, y: 380, w: 120, h: 20, type: 'floor' });
      platforms.push({ x: 850, y: 310, w: 100, h: 20, type: 'floor' });
      platforms.push({ x: 1020, y: 250, w: 90, h: 20, type: 'floor' });
      platforms.push({ x: 1200, y: 350, w: 130, h: 20, type: 'floor' });
      platforms.push({ x: 1400, y: 420, w: 100, h: 20, type: 'floor' });
      platforms.push({ x: 1700, y: 450, w: 200, h: 40, type: 'floor' });
      platforms.push({ x: 1950, y: 420, w: 150, h: 20, type: 'floor' });

      // 砖块 & 问号砖
      platforms.push({ x: 240, y: 330, w: 40, h: 40, type: 'question', item: 'mushroom' });
      platforms.push({ x: 430, y: 260, w: 40, h: 40, type: 'question', item: 'coin' });
      platforms.push({ x: 550, y: 190, w: 40, h: 40, type: 'brick' });
      platforms.push({ x: 700, y: 300, w: 40, h: 40, type: 'question', item: 'mushroom' });
      platforms.push({ x: 880, y: 230, w: 40, h: 40, type: 'brick' });
      platforms.push({ x: 1060, y: 170, w: 40, h: 40, type: 'question', item: 'coin' });
      platforms.push({ x: 1260, y: 270, w: 40, h: 40, type: 'brick' });

      // 敌人 (栗宝宝)
      enemies.push({ x: 300, y: 452, w: 32, h: 28, vx: 1.4, type: 'goomba', alive: true });
      enemies.push({ x: 650, y: 352, w: 32, h: 28, vx: -1.8, type: 'goomba', alive: true });
      enemies.push({ x: 900, y: 282, w: 32, h: 28, vx: 1.5, type: 'goomba', alive: true });
      enemies.push({ x: 1150, y: 322, w: 32, h: 28, vx: -1.6, type: 'goomba', alive: true });
      enemies.push({ x: 1500, y: 392, w: 32, h: 28, vx: 1.9, type: 'goomba', alive: true });

      // 库巴 Boss
      enemies.push({
        x: 2050, y: 360, w: 70, h: 70, vx: 2.4, type: 'bowser', alive: true,
        health: 3, invincible: 0, direction: 1, fireCooldown: 0
      });

      player = {
        x: 60, y: 350, vx: 0, vy: 0,
        width: 32, height: 32,
        big: false,
        onGround: false,
        facing: 1,
        invincible: 0,
      };
      
      gameActive = true;
      gameWin = false;
      gameOver = false;
      levelComplete = false;
      if (lives <= 0) lives = 3;
      cameraX = 0;
      toadTalkTimer = 120;
      updateDisplay();
    }

    function updateDisplay() {
      livesSpan.textContent = lives;
      let scoreStr = String(score).padStart(5, '0').slice(0,5);
      scoreSpan.textContent = scoreStr;
    }

    function rectCollide(r1, r2) {
      return !(r2.x >= r1.x + r1.w || r2.x + r2.w <= r1.x ||
               r2.y >= r1.y + r1.h || r2.y + r2.h <= r1.y);
    }

    function handleCollisions() {
      player.onGround = false;
      const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };

      for (let pl of platforms) {
        const plRect = { x: pl.x, y: pl.y, w: pl.w, h: pl.h };
        if (!rectCollide(pRect, plRect)) continue;

        const dx = (pRect.x + pRect.w/2) - (plRect.x + plRect.w/2);
        const dy = (pRect.y + pRect.h/2) - (plRect.y + plRect.h/2);
        const overlapX = (pRect.w/2 + plRect.w/2) - Math.abs(dx);
        const overlapY = (pRect.h/2 + plRect.h/2) - Math.abs(dy);

        if (overlapX < overlapY) {
          if (dx > 0) player.x = plRect.x + plRect.w;
          else player.x = plRect.x - player.width;
          player.vx = 0;
        } else {
          if (dy > 0) { player.y = plRect.y + plRect.h; player.vy = 0; }
          else { player.y = plRect.y - player.height; player.vy = 0; player.onGround = true; }
        }

        if (player.vy < 0 && dy > 0) {
          if (pl.type === 'question' && pl.item) {
            if (pl.item === 'mushroom') {
              items.push({ x: pl.x+5, y: pl.y-30, w: 30, h: 30, vx: 2, vy: -3, type: 'mushroom' });
            } else if (pl.item === 'coin') {
              score += 100;
            }
            pl.type = 'empty'; pl.item = null;
          } else if (pl.type === 'brick') {
            if (player.big) {
              const idx = platforms.indexOf(pl);
              if (idx > -1) platforms.splice(idx, 1);
              score += 50;
            }
          }
        }
        pRect.x = player.x; pRect.y = player.y;
      }
    }

    function update() {
      if (!gameActive) return;

      const charStats = characters[currentChar];
      
      player.vy += GRAVITY;
      if (player.vy > MAX_FALL) player.vy = MAX_FALL;
      player.x += player.vx;
      player.y += player.vy;

      if (player.x < 0) { player.x = 0; player.vx = 0; }
      if (player.y > 600) { die(); return; }

      handleCollisions();

      player.vx *= charStats.friction;
      if (Math.abs(player.vx) < 0.15) player.vx = 0;

      // 敌人逻辑
      for (let e of enemies) {
        if (!e.alive) continue;
        if (e.type === 'bowser') {
          e.x += e.vx * e.direction;
          if (e.x < 1850) e.direction = 1;
          if (e.x > 2200) e.direction = -1;
          e.vx = 2.8;
          if (e.fireCooldown <= 0 && Math.random()<0.02) {
            fireballs.push({ x: e.x + (e.direction>0?50:-20), y: e.y+30, vx: 5 * e.direction, vy: -1, w: 18, h: 18 });
            e.fireCooldown = 40;
          }
          if (e.fireCooldown > 0) e.fireCooldown--;
          if (e.invincible > 0) e.invincible--;
        } else {
          e.x += e.vx;
          let onPlat = false;
          for (let pl of platforms) {
            if (e.y+e.h > pl.y && e.y < pl.y+pl.h && e.x+e.w > pl.x && e.x < pl.x+pl.w) {
              e.y = pl.y - e.h; onPlat = true;
            }
          }
          if (!onPlat) e.y += 5;
          if (e.x < 100 || e.x > 2700) e.vx *= -1;
        }

        if (player.invincible <= 0) {
          const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };
          const eRect = { x: e.x, y: e.y, w: e.w, h: e.h };
          if (rectCollide(pRect, eRect)) {
            if (player.vy >= 0 && player.y + player.height <= e.y + 15) {
              if (e.type === 'goomba') {
                e.alive = false; score += 200; player.vy = -5;
              } else if (e.type === 'bowser' && e.invincible <= 0) {
                e.health--; e.invincible = 25; player.vy = -7;
                if (e.health <= 0) { e.alive = false; gameWin = true; gameActive = false; score += 5000; }
                else score += 500;
              }
            } else {
              hurt();
            }
          }
        }
      }

      // 火球
      for (let i=fireballs.length-1; i>=0; i--) {
        let f = fireballs[i];
        f.x += f.vx; f.y += f.vy; f.vy += 0.2;
        if (f.y > 500) { fireballs.splice(i,1); continue; }
        if (player.invincible <= 0 && rectCollide({x:player.x,y:player.y,w:player.width,h:player.height}, {x:f.x,y:f.y,w:f.w,h:f.h})) {
          hurt(); fireballs.splice(i,1);
        }
      }

      // 道具
      for (let i=items.length-1; i>=0; i--) {
        let it = items[i];
        it.x += it.vx; it.y += it.vy; it.vy += 0.3;
        if (it.y > 500) { items.splice(i,1); continue; }
        if (rectCollide({x:player.x,y:player.y,w:player.width,h:player.height}, {x:it.x,y:it.y,w:it.w,h:it.h})) {
          if (it.type === 'mushroom' && !player.big) {
            player.big = true; player.height = 48; player.width = 40; player.y -= 10; score += 500;
          }
          items.splice(i,1);
        }
      }

      if (player.x > 2350 && !gameWin && !levelComplete) {
        levelComplete = true;
        gameActive = false;
        gameWin = true;
        stateDisplay.innerText = '👸 救出公主!';
      }

      if (player.invincible > 0) player.invincible--;
      cameraX = Math.min(Math.max(player.x - 350, 0), 1800);
      updateDisplay();
    }

    function hurt() {
      if (player.invincible > 0) return;
      if (player.big) {
        player.big = false; player.height = 32; player.width = 32; player.invincible = 70;
      } else {
        lives--;
        if (lives <= 0) { gameOver = true; gameActive = false; stateDisplay.innerText = '💀 GAME OVER'; }
        else { player.x = 60; player.y = 350; player.vx=0; player.vy=0; player.invincible=50; }
      }
      updateDisplay();
    }

    function die() { lives=0; gameActive=false; gameOver=true; stateDisplay.innerText='💀 GAME OVER'; updateDisplay(); }

    // ---------- 绘图 (使用贴图) ----------
    function draw() {
      ctx.clearRect(0, 0, 960, 540);
      ctx.save();
      ctx.translate(-cameraX, 0);

      // 天空
      ctx.fillStyle = '#5c94fc'; ctx.fillRect(cameraX,0,960,540);
      
      // 云
      ctx.fillStyle = '#ffffffc0';
      ctx.beginPath(); ctx.arc(cameraX+200, 80, 40, 0, Math.PI*2); ctx.fill();
      
      // 平台 (使用tiles图块)
      platforms.forEach(p => {
        if (images.tiles && images.tiles.complete) {
          // 简单映射: floor=第一块, brick=第二块, question=第三块
          let sx = 0, sy = 0;
          if (p.type === 'brick') sx = 18;
          else if (p.type === 'question') sx = 36;
          ctx.drawImage(images.tiles, sx, 0, 18, 18, p.x, p.y, p.w, p.h);
        } else {
          ctx.fillStyle = p.type === 'floor' ? '#8b5e3c' : '#b87c4d';
          ctx.fillRect(p.x, p.y, p.w, p.h);
          if (p.type === 'question') {
            ctx.fillStyle = '#f7d44a'; ctx.fillRect(p.x+8, p.y+8, 24, 24);
          }
        }
      });

      // 敌人
      enemies.forEach(e => {
        if (!e.alive) return;
        if (e.type === 'goomba' && images.goomba && images.goomba.complete) {
          ctx.drawImage(images.goomba, e.x, e.y, e.w, e.h);
        } else if (e.type === 'bowser' && images.bowser && images.bowser.complete) {
          ctx.drawImage(images.bowser, e.x, e.y, e.w, e.h);
        } else {
          ctx.fillStyle = e.type==='goomba' ? '#8b4513' : '#2e6b2e';
          ctx.fillRect(e.x, e.y, e.w, e.h);
        }
        if (e.type === 'bowser') {
          ctx.fillStyle = '#c00'; ctx.fillRect(e.x, e.y-15, 70, 8);
          ctx.fillStyle = '#0f0'; ctx.fillRect(e.x, e.y-15, 70 * (e.health/3), 8);
        }
      });

      // 道具
      items.forEach(it => {
        if (it.type === 'mushroom' && images.mushroom && images.mushroom.complete) {
          ctx.drawImage(images.mushroom, it.x, it.y, it.w, it.h);
        } else {
          ctx.fillStyle = '#ff4f4f'; ctx.fillRect(it.x, it.y, it.w, it.h);
        }
      });

      // 碧姬公主
      if (images.peach && images.peach.complete) {
        ctx.drawImage(images.peach, 2400, 400, 40, 60);
      } else {
        ctx.fillStyle = '#ffb6c1'; ctx.fillRect(2400, 400, 40, 60);
      }

      // 奇诺比奥
      if (images.toad && images.toad.complete) {
        ctx.drawImage(images.toad, 100, 430, 30, 40);
      } else {
        ctx.fillStyle = '#f0d0b0'; ctx.fillRect(100, 430, 30, 40);
      }
      if (toadTalkTimer > 0) {
        ctx.fillStyle = '#fff9e0'; ctx.fillRect(60, 370, 220, 30);
        ctx.fillStyle = '#2d1b0e'; ctx.font='12px monospace'; ctx.fillText('🍄 "公主在另一座城堡!"', 70, 390);
        toadTalkTimer--;
      }

      // 玩家
      if (player.invincible % 8 < 4 || player.invincible <=0) {
        const playerImg = currentChar === 'mario' ? images.mario : images.luigi;
        if (playerImg && playerImg.complete) {
          ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
        } else {
          ctx.fillStyle = characters[currentChar].color || '#d82828';
          ctx.fillRect(player.x, player.y, player.width, player.height);
        }
      }

      ctx.restore();

      if (gameWin) stateDisplay.innerText = levelComplete ? '🏆 公主得救! 胜利!' : '🎉 击败库巴!';
      else if (gameOver) stateDisplay.innerText = '💀 GAME OVER';
      else stateDisplay.innerText = '🏃 ' + characters[currentChar].name;
    }

    // ---------- 键盘控制 ----------
    const keys = { left: false, right: false, up: false };
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') keys.left = true;
      if (e.key === 'ArrowRight') keys.right = true;
      if (e.key === 'ArrowUp') keys.up = true;
      if (e.key === ' ') { e.preventDefault(); resetGame(); }
    });
    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft') keys.left = false;
      if (e.key === 'ArrowRight') keys.right = false;
      if (e.key === 'ArrowUp') keys.up = false;
    });

    function handleInput() {
      if (!gameActive) return;
      const stats = characters[currentChar];
      if (keys.left) { player.vx -= stats.moveSpeed; player.facing = -1; }
      if (keys.right) { player.vx += stats.moveSpeed; player.facing = 1; }
      if (keys.up && player.onGround) {
        player.vy = stats.jumpForce;
        player.onGround = false;
      }
    }

    function resetGame() {
      lives = 3; score = 0; buildLevel(); gameActive = true; gameWin = gameOver = false; updateDisplay();
    }

    function gameLoop() {
      if (gameActive) { handleInput(); update(); }
      draw();
      requestAnimationFrame(gameLoop);
    }

    // 角色选择
    document.getElementById('selectMario').addEventListener('click', () => {
      currentChar = 'mario';
      document.getElementById('selectMario').classList.add('active');
      document.getElementById('selectLuigi').classList.remove('active');
      resetGame();
    });
    document.getElementById('selectLuigi').addEventListener('click', () => {
      currentChar = 'luigi';
      document.getElementById('selectLuigi').classList.add('active');
      document.getElementById('selectMario').classList.remove('active');
      resetGame();
    });
    document.getElementById('restartBtn').addEventListener('click', resetGame);

    // 启动: 先加载图片
    loadAllImages(() => {
      buildLevel();
      gameLoop();
    });
  })();
</script>
</body>
</html>
